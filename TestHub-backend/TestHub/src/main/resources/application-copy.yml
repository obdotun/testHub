spring:
  application:
    name: TestHub

  # Base H2 embarquée (dev)
  datasource:
    url: jdbc:h2:file:./data/testhub;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Upload de fichiers
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: 8080

# Dossiers de stockage
robot:
  storage:
    projects-dir: ./storage/projects    # fichiers .robot uploadés
    reports-dir: ./storage/reports      # rapports générés par RF
  execution:
    timeout-seconds: 300                # timeout max par run